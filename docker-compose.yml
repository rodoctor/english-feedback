name: english-feedback

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-english_feedback}
      POSTGRES_USER: ${POSTGRES_USER:-english_feedback}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-english_feedback}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://english_feedback:english_feedback@postgres:5432/english_feedback}
      APP_SECRET_KEY: ${APP_SECRET_KEY:-change-me-in-production}
      AI_DEFAULT_PROVIDER: ${AI_DEFAULT_PROVIDER:-openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    depends_on:
      - postgres
    ports:
      - "8000:8000"
    volumes:
      - backend_uploads:/app/app/static/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  postgres_data:
    name: english-feedback_postgres_data
  backend_uploads:
    name: english-feedback_backend_uploads