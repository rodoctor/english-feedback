services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-english_trainer}
      POSTGRES_USER: ${POSTGRES_USER:-english_trainer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-english_trainer}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://english_trainer:english_trainer@postgres:5432/english_trainer}
      APP_SECRET_KEY: ${APP_SECRET_KEY:-change-me-in-production}
      AI_DEFAULT_PROVIDER: ${AI_DEFAULT_PROVIDER:-openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    depends_on:
      - postgres
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  postgres_data: